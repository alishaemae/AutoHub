services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: avtohub
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: avtohub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avtohub"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://avtohub:${DB_PASSWORD}@db:5432/avtohub
      AUTO_CREATE_TABLES: "false"
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${PUBLIC_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      PODPISLON_API_KEY: ${PODPISLON_API_KEY}
    volumes:
      - uploads:/app/uploads        # загруженные PDF сохраняются между перезапусками

  nginx:
    image: nginx:alpine
    restart: always
    depends_on: [backend]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/avtohub.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
volumes:
  pgdata:
  uploads:
