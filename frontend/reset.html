<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
<link rel="icon" sizes="any" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>AVTO-hub — новый пароль</title>
<style>
:root{--red:#c63e45;--red-2:#e0575e;--green:#3ba55d;--bg:#14161a;--card:#1e2127;--line:#2b2f36;--text:#f2f3f5;--text-2:#aeb4bd;--text-3:#6b7280}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:420px;width:100%;overflow:hidden}
.logo{background:var(--red);padding:16px 24px;text-align:center}
.logo img{height:58px;width:auto;display:block;margin:0 auto}
.body{padding:26px 24px}
h1{font-size:20px;margin:0 0 6px}
p{color:var(--text-2);font-size:14px;margin:0 0 18px}
label{display:block;font-size:13px;color:var(--text-2);margin-bottom:6px}
input{width:100%;background:#171a1f;border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--text);font-size:15px;margin-bottom:14px}
input:focus{outline:none;border-color:var(--red-2)}
.btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:9px;padding:12px;font-size:15px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.6}
.err{color:var(--red-2);font-size:13px;min-height:18px}
.ok{color:var(--green);font-size:14px;text-align:center;margin-top:10px}
a{color:var(--red-2);text-decoration:none;font-size:14px}
.center{text-align:center;margin-top:14px}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="logo.png" alt="AVTO-hub"></div>
  <div class="body" id="body">
    <h1>Новый пароль</h1>
    <p>Придумайте новый пароль для входа в личный кабинет.</p>
    <label>Новый пароль</label>
    <input id="p1" type="password" placeholder="не короче 6 символов">
    <label>Повторите пароль</label>
    <input id="p2" type="password" placeholder="ещё раз">
    <button class="btn" id="btn">Сохранить пароль</button>
    <div class="err" id="err"></div>
  </div>
</div>
<script>
const API_BASE = location.protocol.startsWith("http") ? "" : "http://localhost:8000";
const params = new URLSearchParams(location.search);
const token = params.get("token") || "";
const $ = s => document.querySelector(s);

if(!token){
  $("#body").innerHTML = '<h1>Ссылка недействительна</h1><p>Не найден код восстановления. Запросите восстановление пароля заново из личного кабинета.</p><div class="center"><a href="cabinet.html">Вернуться ко входу</a></div>';
}

$("#btn") && $("#btn").addEventListener("click", async () => {
  const p1 = $("#p1").value, p2 = $("#p2").value;
  $("#err").textContent = "";
  if(p1.length < 6){ $("#err").textContent = "Пароль должен быть не короче 6 символов"; return; }
  if(p1 !== p2){ $("#err").textContent = "Пароли не совпадают"; return; }
  $("#btn").disabled = true; $("#btn").textContent = "Сохраняем…";
  try{
    const r = await fetch(API_BASE + "/api/auth/reset-password", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ token, new_password: p1 })
    });
    if(!r.ok){
      let m = "Ссылка недействительна или устарела";
      try{ m = (await r.json()).detail || m; }catch(e){}
      $("#err").textContent = m;
      $("#btn").disabled = false; $("#btn").textContent = "Сохранить пароль";
      return;
    }
    $("#body").innerHTML = '<h1>Готово!</h1><p>Пароль изменён. Теперь войдите с новым паролем.</p><div class="center"><a href="cabinet.html">Перейти ко входу</a></div>';
  }catch(e){
    $("#err").textContent = "Не удалось сохранить. Попробуйте позже.";
    $("#btn").disabled = false; $("#btn").textContent = "Сохранить пароль";
  }
});
</script>
</body>
</html>
